<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Metadata -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>NSK AI | Empowering Africa Through AI Education & Community</title>
    <meta
      name="description"
      content="Join NSK AI, a non-profit building an open AI community across Africa. We offer practical workshops, research talks, and real-world projects to build skills."
    />
    <meta name="author" content="NSK AI" />
    <link rel="canonical" href="https://www.nskai.org" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/nsk-ai-logo.svg" />

    <!-- Open Graph (Facebook/LinkedIn/WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.nskai.org" />
    <meta
      property="og:title"
      content="NSK AI | Bambara Artificial Intelligence Foundation"
    />
    <meta
      property="og:description"
      content="Democratizing AI learning across Africa. Build your portfolio with hands-on bootcamps and access mentorship at scale."
    />
    <meta
      property="og:image"
      content="https://www.nskai.orgWebPhoto-Card.jpg"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="NSK AI | Empowering African AI Talent"
    />
    <meta
      name="twitter:description"
      content="From paper-reading clubs to hands-on bootcamps, we help African students gain real AI skills."
    />
    <meta
      name="twitter:image"
      content="https://www.nskai.orgWebPhoto-Card.jpg"
    />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "NGO",
        "name": "NSK AI (Bambara Artificial Intelligence Foundation)",
        "alternateName": "NSKAI",
        "url": "https://www.nskai.org",
        "logo": "https://www.nskai.orgnsk-ai-logo.svg",
        "description": "A registered non-profit building an open, practical AI community across Africa through workshops and research.",
        "sameAs": [
          "https://twitter.com",
          "https://linkedin.com",
          "https://github.com"
        ]
      }
    </script>

    <!-- Robots -->
    <meta name="robots" content="index, follow" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
